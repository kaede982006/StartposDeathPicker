name: Release Geode Mod

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-latest
          - name: iOS
            os: macos-latest
            target: iOS
          - name: Android32
            os: ubuntu-latest
            target: Android32
          - name: Android64
            os: ubuntu-latest
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ["build"]

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: ["package"]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Build Output
          path: release-artifacts

      - name: Recreate v1.0.0 release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TARGET_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t geode_files < <(find release-artifacts -type f -name "*.geode" | sort)
          if [ "${#geode_files[@]}" -eq 0 ]; then
            echo "No .geode files were produced by the GitHub Actions build."
            exit 1
          fi

          gh release delete v1.0.0 --repo "${REPOSITORY}" --yes --cleanup-tag || true
          gh api --method DELETE "repos/${REPOSITORY}/git/refs/tags/v1.0.0" >/dev/null 2>&1 || true

          gh release create v1.0.0 "${geode_files[@]}" \
            --repo "${REPOSITORY}" \
            --target "${TARGET_SHA}" \
            --title "v1.0.0" \
            --notes "GitHub Actions-built release for Startpos Death Picker 1.0.0."
